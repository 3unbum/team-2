<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>최병관 소개 페이지</title>
    <link rel="stylesheet" href="/src/style/reset.css" />
    <link rel="stylesheet" href="/src/style/sub-page.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <img src="/image/BK.png" alt="프로필 사진" />
        <h1>최병관</h1>
      </div>

      <!-- 소개 -->
      <h2>🖐소개합니다</h2>

      <div class="info">
        <span class="info-label"> 현재 거주지 </span>
        <span class="info-value"> 경기도 부천 </span>
      </div>
      <div class="info">
        <span class="info-label"> MBTI </span>
        <span class="info-value"> INTP </span>
      </div>
      <div class="info">
        <span class="info-label"> 요즘 하고 있는 취미 </span>
        <span class="info-value"> 게임 및 영화시청 </span>
      </div>
      <div class="info">
        <span class="info-label"> 좋아하는 음식 </span>
        <span class="info-value"> 고기 </span>
      </div>
      <div class="info">
        <span class="info-label"> 싫어하는 음식 </span>
        <span class="info-value"> 가지, 토마토 </span>
      </div>
      <div class="info">
        <span class="info-label"> 만들어보고 싶은 사이트 </span>
        <span class="info-value">
          주얼리 관련 제품 명품 주얼리부터 커스텀 주얼리까지 정리해서 한눈에
          찾아볼 수 있는 사이트
        </span>
      </div>
      <div class="info">
        <span class="info-label"> TMI </span>
        <ul class="info-value">
          <li>술자리에서 맛잇는 음식 사진을 찍는걸 좋아해요!</li>
          <li>사진찍기 좋은 풍경이 보이면 가끔 사진찍곤해요!</li>
        </ul>
      </div>
      <div class="info">
        <span class="info-label"> FS과정을 시작하며 나의 다짐 </span>
        <span class="info-value">
          팀 단위로 무언가를 해보는건 경험이 별로없어서 많이 걱정인데 최대한
          소통을 잘 해보면서 열심히해보겠습니다.!
        </span>
      </div>
    </div>
  </body>
</html>
