<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>김서윤 소개 페이지</title>
    <link rel="stylesheet" href="/src/style/reset.css" />
    <link rel="stylesheet" href="/src/style/sub-page.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <img src="" alt="프로필 사진" />
        <h1>김서윤</h1>
      </div>

      <!-- 소개 -->
      <h2>🖐소개합니다</h2>

      <div class="info">
        <span class="info-label"> 현재 거주지 </span>
        <span class="info-value"> 서울 살아요 </span>
      </div>
      <div class="info">
        <span class="info-label"> MBTI </span>
        <span class="info-value"> INTJ 에요 </span>
      </div>
      <div class="info">
        <span class="info-label"> 요즘 하고 있는 취미 </span>
        <span class="info-value"> 필라테스 </span>
      </div>
      <div class="info">
        <span class="info-label"> 좋아하는 음식 </span>
        <span class="info-value"> 말차들어간 건 다 좋아해요 </span>
      </div>
      <div class="info">
        <span class="info-label"> 싫어하는 음식 </span>
        <span class="info-value"> 딱히 없어요 </span>
      </div>
      <div class="info">
        <span class="info-label"> 만들어보고 싶은 사이트 </span>
        <span class="info-value">
          커스텀 운세 서비스나 밈/짤 아카이브 서비스
        </span>
      </div>
      <div class="info">
        <span class="info-label"> TMI </span>
        <ul class="info-value">
          <li>올해 말 결혼해요</li>
          <li>야채상회, hostless 플리 좋아해요</li>
        </ul>
      </div>
      <div class="info">
        <span class="info-label"> FS과정을 시작하며 나의 다짐 </span>
        <span class="info-value"> 유의미한 결과를 얻을 수 있길 바라요 </span>
      </div>
    </div>
  </body>
</html>
