<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이은범 소개 페이지</title>
    <link rel="stylesheet" href="/src/style/reset.css" />
    <link rel="stylesheet" href="/src/style/sub-page.css" />
    <link href="https://fonts.cdnfonts.com/css/helvetica-neue-55" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <div class="card">
        <img src="/src/images/EB.png" alt="프로필 사진" />
        <h1 class="name">이은범</h1>
      </div>
    
      <!-- 소개 -->
      <section class="section">
        <h2 class="title">🖐소개합니다</h2>
      
        <div class="info">
          <span class="info-label"> 현재 거주지 </span>
          <span class="info-value"> 충남 천안 </span>
        </div>
        <div class="info">
          <span class="info-label"> MBTI </span>
          <span class="info-value"> ISFP </span>
        </div>
        <div class="info">
          <span class="info-label"> 요즘 하고 있는 취미 </span>
          <span class="info-value"> 게임 / 최근엔 클라이밍을 해보고 싶네요 </span>
        </div>
        <div class="info">
          <span class="info-label"> 좋아하는 음식 </span>
          <span class="info-value"> 초밥, 회 </span>
        </div>
        <div class="info">
          <span class="info-label"> 싫어하는 음식 </span>
          <span class="info-value"> 생굴, 홍어회 </span>
        </div>
        <div class="info">
          <span class="info-label"> 만들어보고 싶은 사이트 </span>
          <span class="info-value"> 키보드를 좋아해서 키보드를 모아서 보고 살수있으며 소통할 수 있는 커뮤니티를 만들어고보고 싶어요 </span>
        </div>
        <div class="info">
          <span class="info-label"> TMI </span>
          <ul class="info-value">
            <li>요즘 좋아하는 만화나 웹툰이 죄다 휴재라 슬픕니다</li>
            <li>제 키보드 중 가장 비싼 키보드는 40만원대입니다</li>
          </ul>
        </div>
        <div class="info">
          <span class="info-label"> FS과정을 시작하며 나의 다짐 </span>
          <span class="info-value"> 7개월동안 온라인에서 진행하는 수업이지만 열심히 해서 배우겠습니다 </span>
        </div>
      </section>
    </div>
  </body>
</html>
