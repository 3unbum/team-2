<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이은범 소개 페이지</title>
    <link rel="stylesheet" href="/src/style/reset.css" />
    <link rel="stylesheet" href="/src/style/sub-page.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <img src="" alt="프로필 사진" />
        <h1>이은범</h1>
      </div>

      <!-- 소개 -->
      <h2>🖐소개합니다</h2>

      <div class="info">
        <span class="info-label"> 현재 거주지 </span>
        <span class="info-value"> 충남 천안 </span>
      </div>
      <div class="info">
        <span class="info-label"> MBTI </span>
        <span class="info-value"> ISFP </span>
      </div>
      <div class="info">
        <span class="info-label"> 요즘 하고 있는 취미 </span>
        <span class="info-value"> 모바일 게임, 키보드 조립 </span>
      </div>
      <div class="info">
        <span class="info-label"> 좋아하는 음식 </span>
        <span class="info-value"> 초밥, 회 </span>
      </div>
      <div class="info">
        <span class="info-label"> 싫어하는 음식 </span>
        <span class="info-value"> 생굴, 홍어회 </span>
      </div>
      <div class="info">
        <span class="info-label"> 만들어보고 싶은 사이트 </span>
        <span class="info-value"> 키보드를 좋아해서 전국 키보드를 모아서 보고 구매도 하고 소통도 할 수 있는 커뮤니티를 만들어보고 싶다. </span>
      </div>
      <div class="info">
        <span class="info-label"> TMI </span>
        <ul class="info-value">
          <li> 요즘 좋아하는 만화랑 웹툰이 둘다 휴재에 들어가서 속상하다. </li>
          <li> 집에서 제일 비싼 키보드는 40만원대 입니다.. </li>
        </ul>
      </div>
      <div class="info">
        <span class="info-label"> FS과정을 시작하며 나의 다짐 </span>
        <span class="info-value"> 7개월동안 온라인에서 진행하지만 그래도 열심히 배우겠습니다. </span>
      </div>
    </div>
  </body>
</html>
